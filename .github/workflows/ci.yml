name: Android CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, V2]

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Test, assemble, and lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Android checks
        shell: bash
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon :app:testDebugUnitTest :app:assembleDebug :app:lintDebug

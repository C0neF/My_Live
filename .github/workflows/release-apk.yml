name: Build release APK

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing release tag to upload the APK to
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release-apk:
    name: Build and upload signed APK
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate signing secrets
        shell: bash
        env:
          MYLIVE_RELEASE_KEYSTORE_BASE64: ${{ secrets.MYLIVE_RELEASE_KEYSTORE_BASE64 }}
          MYLIVE_RELEASE_STORE_PASSWORD: ${{ secrets.MYLIVE_RELEASE_STORE_PASSWORD }}
          MYLIVE_RELEASE_KEY_ALIAS: ${{ secrets.MYLIVE_RELEASE_KEY_ALIAS }}
          MYLIVE_RELEASE_KEY_PASSWORD: ${{ secrets.MYLIVE_RELEASE_KEY_PASSWORD }}
        run: |
          missing=0
          for name in \
            MYLIVE_RELEASE_KEYSTORE_BASE64 \
            MYLIVE_RELEASE_STORE_PASSWORD \
            MYLIVE_RELEASE_KEY_ALIAS \
            MYLIVE_RELEASE_KEY_PASSWORD
          do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub secret: $name"
              missing=1
            fi
          done
          exit "$missing"

      - name: Decode release keystore
        shell: bash
        env:
          MYLIVE_RELEASE_KEYSTORE_BASE64: ${{ secrets.MYLIVE_RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "$MYLIVE_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/mylive-release.jks"

      - name: Build signed release APK
        shell: bash
        env:
          MYLIVE_RELEASE_STORE_FILE: ${{ runner.temp }}/mylive-release.jks
          MYLIVE_RELEASE_STORE_PASSWORD: ${{ secrets.MYLIVE_RELEASE_STORE_PASSWORD }}
          MYLIVE_RELEASE_KEY_ALIAS: ${{ secrets.MYLIVE_RELEASE_KEY_ALIAS }}
          MYLIVE_RELEASE_KEY_PASSWORD: ${{ secrets.MYLIVE_RELEASE_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon :app:testDebugUnitTest :app:assembleRelease

      - name: Prepare APK asset
        shell: bash
        run: |
          apk_path="app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$apk_path" ]; then
            echo "::error::Expected signed APK was not created at $apk_path"
            exit 1
          fi
          mkdir -p release-artifacts
          cp "$apk_path" "release-artifacts/MyLive-${RELEASE_TAG}.apk"

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: release-artifacts/*.apk
